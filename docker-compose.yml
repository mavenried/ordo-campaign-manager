services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: campaign_manager
      POSTGRES_USER: campaign
      POSTGRES_PASSWORD: campaign_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campaign -d campaign_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
